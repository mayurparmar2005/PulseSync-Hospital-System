<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Records | PulseSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/reception.css">
</head>
<body>

    <nav class="navbar reception-nav">
        <div class="logo">⚡ PulseSync <span class="badge">ADMIN</span></div>
        <div class="nav-links u-flex u-gap-15 u-align-center" style="margin-left: 30px;">
            <a href="rc_dashboard.html" class="active">📝 Registration</a>
            <a href="reception-monitor.html">📊 Live Monitor</a>
            <a href="reception-records.html">📂 All Records</a>
            <a href="manage-doctors.html">👨‍⚕️ Staff Directory</a>
        </div>
        <a href="#" onclick="doAdminLogout()" class="btn-logout">Logout ➤</a>
    </nav>

    <div class="u-p-20">
        <h2 class="u-mt-20">📂 Patient Database</h2>
        <div class="filter-bar u-flex u-gap-15 u-mt-20 u-align-center">
            <input type="text" id="searchInput" placeholder="🔍 Search by name, mobile or doctor...">
            <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="WAITING">⏳ Waiting</option>
                <option value="COMPLETED">✅ Completed</option>
            </select>
        </div>
        <div class="record-count u-text-muted u-text-small u-mb-10" id="recordCount"></div>

        <table class="u-w-full">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Patient Name</th>
                    <th>Doctor</th>
                    <th>Token</th>
                    <th>Mobile</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="recordTable"></tbody>
        </table>
    </div>

    <div id="rxModal" class="modal-overlay">
        <div class="modal-content" style="width: 500px; text-align: left;">
            <span class="close-btn" onclick="closeRxModal()">&times;</span>
            <div style="border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="color: #0056b3; margin: 0;">⚡ PulseSync Rx</h2>
                <p class="u-text-muted u-text-small" style="margin: 0;">Official E-Prescription Record</p>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem;">
                <div>
                    <strong>Patient:</strong> <span id="rxPatientName">--</span><br>
                    <strong>Mobile:</strong> <span id="rxMobile">--</span>
                </div>
                <div style="text-align: right;">
                    <strong>Doctor:</strong> <span id="rxDoctorName">--</span><br>
                    <strong>Date:</strong> <span id="rxDate">--</span>
                </div>
            </div>

            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; min-height: 120px; border: 1px solid #ddd;">
                <h4 style="margin-top: 0; color: #333; margin-bottom: 10px;">Clinical Notes / Medicines:</h4>
                <p id="rxNotes" style="font-family: monospace; color: #444; white-space: pre-wrap; margin: 0;">--</p>
            </div>

            <div style="margin-top: 20px; text-align: right;">
                <button class="btn-primary" onclick="window.print()" style="padding: 10px 20px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer;">🖨️ Print Rx</button>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
    <script src="js/reception.js"></script>
</body>
</html>
