<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OPD Console | PulseSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2.0">
    <link rel="stylesheet" href="css/doctor.css?v=2.0">
</head>
<body>

    <div class="top-bar">
        <div style="display: flex; align-items: center;">
            <div class="logo-title">⚡ OPD Console</div>
            <div class="welcome-msg">Loading Doctor Profile...</div>
        </div>
        <div class="status-controls">
            <span class="status-label">Status:</span>
            <button class="status-btn active btn-online">🟢 Active</button>
            <button class="status-btn btn-break">☕ Break</button>
            <button class="status-btn btn-offline">🔴 Offline</button>
            <button onclick="logout()" class="btn-logout" style="margin-left: 15px; background: white; border: 1px solid #dc3545; color: #dc3545; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Logout ➜</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        
        <div class="queue-sidebar">
            <div class="queue-header">
                <h3>Waiting Room</h3>
                <p class="u-text-muted u-text-small" style="margin-bottom: 0;">Loading queue...</p>
            </div>
            <ul class="patient-list" id="doctorQueueList">
                <li style="padding: 15px; color: #666; text-align: center;">Syncing with server...</li>
            </ul>
        </div>

        <div class="clinical-area" id="clinicalWorkspace">
            
            <div class="patient-card" id="activePatientCard" style="opacity: 0.5;">
                <div class="card-header">
                    <div>
                        <h1 id="displayName">Waiting for Patient...</h1>
                        <div class="vitals u-mt-5" id="vitalsBox" style="display: none;">
                            <span class="tag">Mobile: <span id="displayMobile"></span></span>
                            <span class="tag" style="background: #ffebee; color: #c62828;">Primary Symptom</span>
                            <span class="tag" style="background: #fff3cd; color: #856404;" id="displaySymptoms"></span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <p style="color: #666; font-size: 0.9rem;" id="displayToken">--</p>
                    </div>
                </div>

                <div style="display: flex; gap: 30px; margin-top: 20px;">
                    
                    <div style="flex: 2;">
                        <div class="prescription-pad">
                            <label style="color: #0056b3; font-weight: bold;">E-Prescription (Rx)</label>
                            <textarea id="prescriptionBox" placeholder="Type medicines, dosages, and advice here..."></textarea>
                        </div>
                    </div>

                    <div style="flex: 1;" class="patient-history-panel">
                        <h3>Medical History</h3>
                        <div class="history-container" id="patientHistoryList">
                            <p class="u-text-muted">Waiting for patient data...</p>
                        </div>
                    </div>

                </div>

                <div class="action-buttons u-mt-20">
                    <button class="btn-action btn-finish" onclick="completeVisit()" style="flex: 2;">✅ Complete & Send Rx</button>
                    <button class="btn-action btn-nudge" onclick="swapPatient()" style="flex: 1;">⏭️ Skip/Swap</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/doctor.js?v=2.0"></script>
</body>
</html>
