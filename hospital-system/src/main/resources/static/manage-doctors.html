<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Staff | PulseSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reception.css">
    <style>
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .staff-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #0056b3; }
        .staff-card h3 { margin-bottom: 5px; color: #333; }
        .staff-card p { margin-bottom: 5px; font-size: 0.9rem; color: #666; }
        .rating-badge { display: inline-block; background: #fff3cd; color: #856404; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar reception-nav">
        <div class="logo">⚡ PulseSync <span class="badge">ADMIN</span></div>
        <div class="nav-links u-flex u-gap-15 u-align-center" style="margin-left: 30px;">
            <a href="rc_dashboard.html" class="active">📝 Registration</a>
            <a href="reception-monitor.html">📊 Live Monitor</a>
            <a href="reception-records.html">📂 All Records</a>
            <a href="manage-doctors.html">👨‍⚕️ Staff Directory</a>
        </div>
        <a href="#" onclick="doAdminLogout()" class="btn-logout">Logout ➤</a>
    </nav>

    <div class="dashboard-container" style="display: block;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h1 style="color: #0056b3;">Hospital Staff Directory</h1>
                <p class="u-text-muted">Manage doctors, view ratings, and register new staff.</p>
            </div>
            <button onclick="document.getElementById('addDoctorModal').style.display='flex'" class="btn-admin" style="width: auto; background: #28a745;">➕ Hire New Doctor</button>
        </div>

        <div class="staff-grid" id="adminStaffGrid">
            <p class="u-text-muted">Loading staff data...</p>
        </div>
    </div>

    <div id="addDoctorModal" class="modal-overlay">
        <div class="modal-content" style="width: 500px; text-align: left;">
            <span class="close-btn" onclick="document.getElementById('addDoctorModal').style.display='none'">&times;</span>
            <h2 style="color: #28a745; margin-bottom: 15px;">👨‍⚕️ Register New Doctor</h2>
            
            <div class="input-group u-mt-10"><label>Doctor Name</label><input type="text" id="newDocName" placeholder="e.g. Dr. Ramesh Kumar"></div>
            <div class="input-group u-mt-10"><label>Specialization</label><input type="text" id="newDocSpec" placeholder="e.g. Cardiologist"></div>
            <div class="input-group u-mt-10"><label>Private Clinic / Extra Details</label><input type="text" id="newDocClinic" placeholder="e.g. City Care Clinic (Evening Shift)"></div>
            <div style="display: flex; gap: 15px;" class="u-mt-10">
                <div class="input-group" style="flex: 1;"><label>Email (Login ID)</label><input type="email" id="newDocEmail" placeholder="doctor@pulse.com"></div>
                <div class="input-group" style="flex: 1;"><label>Temporary Password</label><input type="text" id="newDocPass" placeholder="e.g. doc123"></div>
            </div>
            
            <button type="button" onclick="adminAddNewDoctor()" class="btn-admin u-mt-20" style="background: #28a745;">Register Doctor</button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/manage-doctors.js"></script>
</body>
</html>
